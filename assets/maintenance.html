<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンテナンス中 | clusters-prj.com</title>
    <style>
        /* スタイルは前回のものをベースに固定 */
        :root { --primary-color: #007bff; --bg-color: #f0f2f5; --text-color: #444; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 480px; width: 90%; text-align: center; }
        .eta-container { margin: 25px 0; padding: 15px; background-color: #f8f9fa; border-left: 4px solid var(--primary-color); border-radius: 4px; text-align: left; }
        .eta-label { font-size: 12px; color: #888; font-weight: bold; }
        .eta-time { font-size: 20px; font-weight: bold; color: var(--primary-color); display: block; margin-top: 5px; }
        .progress-bar-bg { background: #eee; border-radius: 10px; height: 10px; width: 100%; overflow: hidden; margin-top: 8px; }
        .progress-bar-fill { background: linear-gradient(90deg, var(--primary-color), #00c6ff); height: 100%; width: 0%; transition: width 1s ease-in-out; }
        .footer { margin-top: 30px; font-size: 12px; color: #bbb; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-box" style="font-size: 50px;">🏗️</div>
        <h1 style="font-size: 22px;">ただいま整備中です</h1>
        
        <div class="eta-container">
            <span class="eta-label">Expected Completion</span>
            <span id="eta-display" class="eta-time">読み込み中...</span>
        </div>

        <div class="progress-box">
            <div style="display: flex; justify-content: space-between; font-size: 12px; color: #888;">
                <span>Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="footer">
            &copy; 2026 clusters-prj.com
        </div>
    </div>

    <script>
        // --- メンテ情報をここで更新 ---
        const config = {
            eta: "2026年4月26日 16:30 頃", // 完了予定
            progress: 0,                   // 進捗（0〜100）
            message: "インフラの最適化を行っています。"
        };

        // 画面に反映
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('eta-display').textContent = config.eta;
            document.getElementById('progress-text').textContent = config.progress + "%";
            
            // アニメーションを効かせるため少し遅らせて実行
            setTimeout(() => {
                document.getElementById('progress-fill').style.width = config.progress + "%";
            }, 100);
        });
    </script>
</body>
</html>
